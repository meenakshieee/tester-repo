name: CI Gating Suite

on:
  # Gate: run the suite on every PR targeting the protected branch.
  # Branch protection then requires this check to pass before the PR can merge.
  pull_request:
    branches: [ main, master ]
  # Post-merge: verify the protected branch stays green after a merge.
  push:
    branches: [ main, master ]
  # Allow manual runs from the Actions tab.
  workflow_dispatch:

# If new commits are pushed to the same PR/branch, cancel the superseded run
# so only the latest commit is gated (saves runner minutes).
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# Least-privilege token: the suite only needs to read the repo.
permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
    # 1. Check out the tester repository (this repo)
    - name: Checkout Tester Repo
      uses: actions/checkout@v4

    # 2. Clone the application under test into a sibling directory
    # This matches the ../app/course-catalog-app path expected by local tools & agent
    - name: Clone Course Catalog App
      run: |
        git clone https://github.com/WeStOn2000/Full-Stack-App-with-React-and-a-REST-API.git ../app/course-catalog-app

    # 3. Set up Node.js for running the application
    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 20

    # 4. Bootstrap and start the backend Express API
    - name: Start Backend API
      run: |
        cd ../app/course-catalog-app/api
        npm install
        npm run seed
        npm start &
        npx wait-on http://localhost:5000/api/courses

    # 5. Bootstrap and start the frontend React Client
    - name: Start Frontend Client
      run: |
        cd ../app/course-catalog-app/client
        npm install
        npm run dev &
        npx wait-on http://localhost:5173

    # 6. Set up Python for running the tests and the AI agent
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'
        cache: 'pip'

    # 7. Install python dependencies & Playwright browsers
    - name: Install Python Dependencies
      run: |
        pip install -r requirements.txt
        playwright install chromium

    # 8. Run the test suite (API + E2E). Failure artifacts (trace/video/screenshot)
    #    are captured on the Linux runner, where the xdist output-dir race does
    #    not occur, and uploaded below for debugging.
    - name: Run Test Suite
      run: |
        pytest -v \
          --tracing=retain-on-failure \
          --video=retain-on-failure \
          --screenshot=only-on-failure

    # 9. Upload test reports and failure artifacts (always, even on failure).
    - name: Upload test artifacts
      if: ${{ always() }}
      uses: actions/upload-artifact@v4
      with:
        name: test-artifacts
        path: |
          reports/
          test-results/
          agent/generated/
        if-no-files-found: ignore

    # 10. Verify the AI Agent runs. This is a best-effort smoke check, NOT a
    #     merge gate: a rate-limited or transient LLM API error must never block
    #     a merge, so the step is non-blocking (continue-on-error).
    - name: Run Test-Writing AI Agent (non-blocking)
      if: ${{ always() }}
      continue-on-error: true
      env:
        GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
      run: |
        if [ -n "$GEMINI_API_KEY" ]; then
          python agent/generate_tests.py
        else
          echo "Skipping AI agent execution because GEMINI_API_KEY secret is not set."
        fi
