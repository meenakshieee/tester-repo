[pytest]
# Make the repo root importable so tests can do `from pages... / clients... / config`.
pythonpath = .

# Test discovery
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Tagging taxonomy (see CONTRIBUTING.md). Registered so --strict-markers can enforce them.
markers =
    api: Backend REST API contract tests (no browser required).
    e2e: End-to-end browser tests driven through the React UI.
    smoke: Fast, high-value checks suitable for a pre-merge gate.
    regression: Broader coverage run on the full suite.
    quarantine: Known-flaky tests, excluded from default/gate runs until fixed.

# Defaults (kept xdist-safe and cross-platform):
#  - verbose output, strict markers, slowest-test report
#  - JUnit XML for CI/reporting integrations
#
# Failure artifacts (trace/video/screenshot) are NOT enabled here on purpose:
# Playwright's shared output dir races across xdist workers on Windows, breaking
# `pytest -n auto`. They are enabled in CI instead (Linux runner, where they are
# also uploaded as artifacts). Locally, opt in when debugging:
#   pytest tests/e2e --tracing=retain-on-failure --video=retain-on-failure
addopts =
    -v
    --strict-markers
    --durations=5
    --junitxml=reports/junit.xml
