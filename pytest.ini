[pytest]
# Make the repo root importable so tests can do `from pages.login_page import LoginPage`.
pythonpath = .

# Test discovery
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Marker registry (avoids PytestUnknownMarkWarning)
markers =
    api: Backend REST API contract tests (no browser required).
    e2e: End-to-end browser tests driven through the React UI.
    smoke: Fast, high-value checks suitable for a CI gate.

# Sensible defaults: verbose, show slowest tests, strict markers.
addopts = -v --strict-markers --durations=5
